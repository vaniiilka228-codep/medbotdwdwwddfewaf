<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>MedHelper</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a1a;--bg2:#12122a;--card:#1a1a3e;--purple:#b347ff;--blue:#4d7cff;--pink:#ff47ab;--cyan:#47ffdd;--green:#47ff83;--red:#ff4757;--orange:#ffa502;--text:#fff;--text2:#a0a0cc;--text3:#6a6a99;--border:rgba(179,71,255,0.2);--glow:0 0 20px rgba(179,71,255,0.3)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 20% 50%,rgba(179,71,255,0.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(77,124,255,0.08) 0%,transparent 50%);pointer-events:none;z-index:0}
.app{max-width:480px;margin:0 auto;position:relative;z-index:1;padding-bottom:70px}
.hdr{padding:14px;text-align:center;position:sticky;top:0;background:rgba(10,10,26,0.95);backdrop-filter:blur(10px);z-index:50;border-bottom:1px solid var(--border)}
.hdr h1{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--purple),var(--blue),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .sub{color:var(--text3);font-size:10px;margin-top:2px}
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(18,18,42,0.98);backdrop-filter:blur(10px);border-top:1px solid var(--border);display:flex;z-index:100;max-width:480px;margin:0 auto}
.nav-btn{flex:1;padding:8px 4px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative}
.nav-btn:active{transform:scale(0.9)}
.nav-btn .ico{font-size:18px}
.nav-btn .lbl{font-size:9px;color:var(--text3);margin-top:1px}
.nav-btn.on .lbl{color:var(--purple)}
.nav-btn.on .ico{filter:drop-shadow(0 0 6px rgba(179,71,255,0.6))}
.nav-btn .badge{position:absolute;top:2px;right:calc(50% - 16px);background:var(--pink);color:#fff;width:15px;height:15px;border-radius:50%;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center}
.page{display:none;padding:10px 14px;animation:fadeIn 0.3s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.stats{display:flex;gap:6px;margin-bottom:12px}
.stat{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:8px 4px;text-align:center}
.stat .v{font-size:15px;font-weight:800;background:linear-gradient(135deg,var(--purple),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat .l{font-size:8px;color:var(--text3);margin-top:1px}
.search{position:relative;margin-bottom:10px}
.search input{width:100%;padding:9px 12px 9px 36px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;outline:none;transition:border 0.3s}
.search input:focus{border-color:var(--purple);box-shadow:var(--glow)}
.search input::placeholder{color:var(--text3)}
.search .ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;opacity:0.5}
.tabs{display:flex;gap:5px;margin-bottom:10px;overflow-x:auto;padding-bottom:4px;-ms-overflow-style:none;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:5px 10px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.2s}
.tab:active{transform:scale(0.95)}
.tab.on{background:linear-gradient(135deg,var(--purple),var(--blue));color:#fff;border-color:transparent;box-shadow:var(--glow)}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:7px;transition:all 0.2s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--purple),var(--blue),var(--pink));opacity:0;transition:opacity 0.3s}
.card:active{border-color:rgba(179,71,255,0.4)}
.card:active::before{opacity:1}
.card .top{display:flex;align-items:flex-start;margin-bottom:5px}
.card .em{font-size:26px;margin-right:8px;filter:drop-shadow(0 0 4px rgba(179,71,255,0.4))}
.card .info{flex:1}
.card .nm{font-size:13px;font-weight:700;line-height:1.2}
.card .cat{font-size:9px;color:var(--purple);font-weight:600}
.card .desc{font-size:10px;color:var(--text2);line-height:1.3;margin:3px 0 6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .prices{display:flex;flex-wrap:wrap;gap:4px}
.badge-hot{position:absolute;top:6px;right:6px;background:linear-gradient(135deg,#ff6b35,var(--pink));color:#fff;padding:2px 5px;border-radius:4px;font-size:8px;font-weight:700}
.badge-recipe{position:absolute;top:6px;right:6px;background:linear-gradient(135deg,var(--cyan),var(--green));color:#000;padding:2px 5px;border-radius:4px;font-size:8px;font-weight:700}
.pbtn{padding:5px 8px;background:rgba(179,71,255,0.1);border:1px solid rgba(179,71,255,0.3);border-radius:6px;color:var(--purple);font-size:10px;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;min-width:60px}
.pbtn:active{background:linear-gradient(135deg,var(--purple),var(--blue));color:#fff;border-color:transparent;transform:scale(0.95)}
.pbtn .d{font-size:8px;opacity:0.8}
.pbtn .p{font-size:11px;font-weight:800}
.rbtn{width:100%;padding:6px;margin-top:5px;background:rgba(71,255,221,0.1);border:1px solid rgba(71,255,221,0.3);border-radius:6px;color:var(--cyan);font-size:10px;font-weight:600;cursor:pointer;text-align:center;transition:all 0.2s}
.rbtn:active{background:rgba(71,255,221,0.2);transform:scale(0.98)}
.big-btn{width:100%;padding:11px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:6px}
.big-btn:active{transform:scale(0.98)}
.big-btn.primary{background:linear-gradient(135deg,var(--purple),var(--blue));color:#fff;box-shadow:0 4px 15px rgba(179,71,255,0.3)}
.big-btn.danger{background:rgba(255,71,87,0.15);border:1px solid rgba(255,71,87,0.3);color:var(--red)}
.cart-item{display:flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px;margin-bottom:5px}
.cart-item .ci-info{flex:1;margin:0 8px}
.cart-item .ci-name{font-size:12px;font-weight:600}
.cart-item .ci-dose{font-size:9px;color:var(--text2)}
.cart-item .ci-price{font-size:12px;font-weight:700;color:var(--cyan);white-space:nowrap}
.cart-item .ci-controls{display:flex;align-items:center;gap:4px}
.cart-item .ci-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cart-item .ci-btn:active{background:var(--purple);border-color:var(--purple)}
.cart-item .ci-qty{font-size:12px;font-weight:700;min-width:18px;text-align:center}
.cart-item .ci-del{color:var(--red);font-size:14px;cursor:pointer;margin-left:4px}
.order-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:6px}
.order-card .oc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.order-card .oc-id{font-weight:700;font-size:13px}
.order-card .oc-status{font-size:10px;padding:2px 6px;border-radius:5px;font-weight:600}
.order-card .oc-status.pending{background:rgba(255,165,0,0.15);color:var(--orange)}
.order-card .oc-status.paid{background:rgba(71,255,131,0.15);color:var(--green)}
.order-card .oc-status.shipped{background:rgba(77,124,255,0.15);color:var(--blue)}
.order-card .oc-status.completed{background:rgba(71,255,131,0.15);color:var(--green)}
.order-card .oc-status.cancelled{background:rgba(255,71,87,0.15);color:var(--red)}
.order-card .oc-info{font-size:10px;color:var(--text2)}
.order-card .oc-total{font-size:13px;font-weight:700;color:var(--cyan);margin-top:3px}
.order-card .oc-items{margin-top:4px;padding-top:4px;border-top:1px solid var(--border)}
.order-card .oc-item{font-size:10px;color:var(--text2);padding:1px 0}
.profile-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px}
.profile-card .pc-title{font-size:11px;color:var(--text3);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.profile-card .pc-row{display:flex;justify-content:space-between;padding:3px 0;font-size:12px}
.profile-card .pc-label{color:var(--text2)}
.profile-card .pc-value{font-weight:700}
.review-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:6px}
.review-card .rc-stars{color:gold;font-size:13px}
.review-card .rc-user{font-size:10px;color:var(--purple);margin-top:1px}
.review-card .rc-text{font-size:11px;color:var(--text2);margin-top:3px;line-height:1.3}
.review-card .rc-date{font-size:9px;color:var(--text3);margin-top:2px}
.ref-stat{display:flex;gap:6px;margin:6px 0}
.ref-stat>div{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px;text-align:center}
.ref-stat .rv{font-size:15px;font-weight:800;color:var(--purple)}
.ref-stat .rl{font-size:8px;color:var(--text3)}
.empty{text-align:center;padding:30px 16px;color:var(--text3)}
.empty .ei{font-size:36px;margin-bottom:8px}
.empty .et{font-size:13px}
.loading{text-align:center;padding:24px;color:var(--text3)}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 8px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--card);border:1px solid var(--green);color:var(--green);padding:7px 16px;border-radius:8px;font-size:11px;font-weight:600;z-index:200;transition:transform 0.3s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.sec-title{font-size:15px;font-weight:800;margin-bottom:8px;background:linear-gradient(135deg,var(--purple),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.product-count{font-size:10px;color:var(--text3);text-align:center;margin-bottom:8px}
.rating-summary{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:10px;text-align:center}
.rating-summary .rs-avg{font-size:24px;font-weight:800;color:gold}
.rating-summary .rs-stars{font-size:16px;color:gold}
.rating-summary .rs-count{font-size:10px;color:var(--text3)}
</style>
</head>
<body>
<div class="app">
<div class="hdr"><h1>🏥 MedHelper</h1><div class="sub">Каталог медикаментов • 60+ препаратов</div></div>

<div class="page active" id="pg-catalog">
<div class="stats"><div class="stat"><div class="v" id="sBal">0</div><div class="l">Баланс ₽</div></div><div class="stat"><div class="v" id="sOrd">0</div><div class="l">Заказов</div></div><div class="stat"><div class="v" id="sCart">0</div><div class="l">В корзине</div></div><div class="stat"><div class="v" id="sProd">0</div><div class="l">Товаров</div></div></div>
<div class="search"><span class="ic">🔍</span><input type="text" id="si" placeholder="Поиск препаратов..."></div>
<div class="tabs" id="tabs"></div>
<div class="product-count" id="pcount"></div>
<div id="catalog-list"><div class="loading"><div class="spinner"></div>Загрузка каталога...</div></div>
</div>

<div class="page" id="pg-cart"><div class="sec-title">🛒 Корзина</div><div id="cart-list"></div><div id="cart-summary" style="display:none"><div style="display:flex;justify-content:space-between;padding:8px 0;font-size:14px;font-weight:700;border-top:1px solid var(--border);margin-top:6px"><span>Итого:</span><span id="cart-total-val" style="color:var(--cyan)">0₽</span></div><button class="big-btn primary" onclick="goBot()">✅ Оформить в боте</button><button class="big-btn danger" onclick="clearCart()" style="margin-top:5px">🗑 Очистить</button></div></div>

<div class="page" id="pg-orders"><div class="sec-title">📦 Мои заказы</div><div id="orders-list"><div class="loading"><div class="spinner"></div>Загрузка...</div></div></div>

<div class="page" id="pg-favs"><div class="sec-title">⭐ Избранное</div><div id="favs-list"><div class="loading"><div class="spinner"></div>Загрузка...</div></div></div>

<div class="page" id="pg-profile"><div class="sec-title">👤 Профиль</div><div id="profile-content"><div class="loading"><div class="spinner"></div>Загрузка...</div></div><div class="sec-title" style="margin-top:14px">📝 Отзывы</div><div id="reviews-content"></div></div>
</div>

<div class="nav">
<div class="nav-btn on" data-page="catalog" onclick="switchPage('catalog')"><div class="ico">🏠</div><div class="lbl">Каталог</div></div>
<div class="nav-btn" data-page="cart" onclick="switchPage('cart')"><div class="ico">🛒</div><div class="lbl">Корзина</div><div class="badge" id="nav-cart-badge" style="display:none">0</div></div>
<div class="nav-btn" data-page="orders" onclick="switchPage('orders')"><div class="ico">📦</div><div class="lbl">Заказы</div></div>
<div class="nav-btn" data-page="favs" onclick="switchPage('favs')"><div class="ico">⭐</div><div class="lbl">Избранное</div></div>
<div class="nav-btn" data-page="profile" onclick="switchPage('profile')"><div class="ico">👤</div><div class="lbl">Профиль</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg=window.Telegram.WebApp;tg.ready();tg.expand();
try{tg.setHeaderColor('#0a0a1a');tg.setBackgroundColor('#0a0a1a')}catch(e){}
const API=window.location.origin;
const uid=tg.initDataUnsafe?.user?.id||0;
let allProducts=[],cartCount=0,curCat='all';

function switchPage(p){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById('pg-'+p).classList.add('active');document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));document.querySelector(`.nav-btn[data-page="${p}"]`).classList.add('on');if(p==='cart')loadCart();if(p==='orders')loadOrders();if(p==='favs')loadFavorites();if(p==='profile'){loadProfile();loadReviews()}try{tg.HapticFeedback.impactOccurred('light')}catch(e){}}

async function init(){await Promise.all([loadCatalog(),loadUser(),loadCartCount()])}

async function loadCatalog(){try{const r=await fetch(API+'/api/catalog');const d=await r.json();if(d.ok){allProducts=d.products;document.getElementById('sProd').textContent=allProducts.length;buildTabs();renderCatalog()}}catch(e){document.getElementById('catalog-list').innerHTML='<div class="empty"><div class="ei">😔</div><div class="et">Ошибка загрузки</div></div>'}}

function buildTabs(){const cats=[...new Set(allProducts.map(p=>p.category))];const t=document.getElementById('tabs');let h='<div class="tab on" data-c="all">Все ('+allProducts.length+')</div><div class="tab" data-c="popular">🔥 Хиты</div>';cats.forEach(c=>{const cnt=allProducts.filter(p=>p.category===c).length;h+='<div class="tab" data-c="'+c+'">'+c+' ('+cnt+')</div>'});t.innerHTML=h;t.querySelectorAll('.tab').forEach(tab=>{tab.onclick=()=>{t.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));tab.classList.add('on');curCat=tab.dataset.c;renderCatalog()}})}

function renderCatalog(sq=''){let f=allProducts;if(curCat==='popular')f=f.filter(p=>p.is_popular);else if(curCat!=='all')f=f.filter(p=>p.category===curCat);if(sq){const q=sq.toLowerCase();f=f.filter(p=>p.name.toLowerCase().includes(q)||p.desc.toLowerCase().includes(q)||p.category.toLowerCase().includes(q))}document.getElementById('pcount').textContent=f.length+' препаратов';const el=document.getElementById('catalog-list');if(!f.length){el.innerHTML='<div class="empty"><div class="ei">🔍</div><div class="et">Ничего не найдено</div></div>';return}el.innerHTML=f.map(p=>{const pr=p.prices||{};const btns=Object.entries(pr).sort((a,b)=>a[1]-b[1]).map(([d,v])=>`<div class="pbtn" onclick="addToCart(event,${p.id},'${d.replace(/'/g,"\\'")}',${v})"><span class="d">${d}</span><span class="p">${v}₽</span></div>`).join('');const rec=p.recipe_price>0?`<div class="rbtn" onclick="addToCart(event,${p.id},'Рецепт',${p.recipe_price})">📋 Рецепт — ${p.recipe_price}₽${p.recipe_required?' ⚠️':''}</div>`:'';const hot=p.is_popular?'<div class="badge-hot">🔥 ХИТ</div>':'';const recBadge=p.recipe_required&&!p.is_popular?'<div class="badge-recipe">📋 Рецепт</div>':'';return`<div class="card">${hot}${recBadge}<div class="top"><span class="em">${p.emoji}</span><div class="info"><div class="nm">${p.name}</div><div class="cat">${p.category}</div></div></div><div class="desc">${p.desc}</div><div class="prices">${btns}</div>${rec}</div>`}).join('')}

let searchTimer;document.getElementById('si').addEventListener('input',e=>{clearTimeout(searchTimer);searchTimer=setTimeout(()=>renderCatalog(e.target.value),300)});

async function loadUser(){if(!uid)return;try{const r=await fetch(API+'/api/user?user_id='+uid);const d=await r.json();if(d.ok){document.getElementById('sBal').textContent=Math.round(d.user.balance);document.getElementById('sOrd').textContent=d.user.orders}}catch(e){}}

async function loadCartCount(){if(!uid)return;try{const r=await fetch(API+'/api/cart?user_id='+uid);const d=await r.json();if(d.ok){cartCount=d.count;updateCartBadge();document.getElementById('sCart').textContent=d.count}}catch(e){}}

function updateCartBadge(){const b=document.getElementById('nav-cart-badge');b.textContent=cartCount;b.style.display=cartCount>0?'flex':'none'}

async function addToCart(e,pid,dos,price){e.stopPropagation();if(!uid){toast('❌ Откройте через бота');return}const btn=e.currentTarget;btn.style.transform='scale(0.9)';btn.style.opacity='0.6';setTimeout(()=>{btn.style.transform='';btn.style.opacity=''},300);try{const r=await fetch(API+'/api/cart/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:uid,product_id:pid,item_type:dos==='Рецепт'?'recipe':'drug',dosage:dos,price:price,quantity:1})});const d=await r.json();if(d.ok){cartCount=d.cart_count;updateCartBadge();document.getElementById('sCart').textContent=cartCount;toast('✅ Добавлено в корзину!');try{tg.HapticFeedback.impactOccurred('light')}catch(e){}}else toast('❌ '+( d.error||'Ошибка'))}catch(e){toast('❌ Ошибка сети')}}

async function loadCart(){if(!uid)return;const el=document.getElementById('cart-list');const sum=document.getElementById('cart-summary');try{const r=await fetch(API+'/api/cart?user_id='+uid);const d=await r.json();if(!d.ok||!d.items.length){el.innerHTML='<div class="empty"><div class="ei">🛒</div><div class="et">Корзина пуста<br><small>Добавьте товары из каталога</small></div></div>';sum.style.display='none';return}el.innerHTML=d.items.map(i=>`<div class="cart-item"><span style="font-size:20px">${i.type==='recipe'?'📋':'💊'}</span><div class="ci-info"><div class="ci-name">${i.name}</div><div class="ci-dose">${i.dosage}</div></div><div class="ci-controls"><div class="ci-btn" onclick="updateCart(${i.id},${i.qty-1})">−</div><div class="ci-qty">${i.qty}</div><div class="ci-btn" onclick="updateCart(${i.id},${i.qty+1})">+</div></div><div class="ci-price">${(i.price*i.qty).toFixed(0)}₽</div><div class="ci-del" onclick="updateCart(${i.id},0)">✕</div></div>`).join('');document.getElementById('cart-total-val').textContent=d.total.toFixed(0)+'₽';sum.style.display='block';cartCount=d.count;updateCartBadge()}catch(e){el.innerHTML='<div class="empty"><div class="ei">😔</div><div class="et">Ошибка загрузки</div></div>';sum.style.display='none'}}

async function updateCart(cid,qty){try{await fetch(API+'/api/cart/update',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cart_id:cid,quantity:qty,user_id:uid})});loadCart();try{tg.HapticFeedback.impactOccurred('light')}catch(e){}}catch(e){}}

async function clearCart(){try{await fetch(API+'/api/cart/clear',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:uid})});cartCount=0;updateCartBadge();loadCart();toast('🗑 Корзина очищена')}catch(e){}}

async function loadOrders(){if(!uid)return;const el=document.getElementById('orders-list');try{const r=await fetch(API+'/api/orders?user_id='+uid);const d=await r.json();if(!d.ok||!d.orders.length){el.innerHTML='<div class="empty"><div class="ei">📦</div><div class="et">Нет заказов<br><small>Оформите первый заказ!</small></div></div>';return}const stMap={pending:'⏳ Ожидает',paid:'✅ Оплачен',shipped:'🚚 Отправлен',completed:'✅ Завершён',cancelled:'❌ Отменён'};el.innerHTML=d.orders.map(o=>{const items=o.items.map(i=>`<div class="oc-item">• ${i.name} ${i.dosage||''} ×${i.qty} = ${(i.total||0).toFixed(0)}₽</div>`).join('');return`<div class="order-card"><div class="oc-head"><span class="oc-id">#${o.id}</span><span class="oc-status ${o.status}">${stMap[o.status]||o.status}</span></div><div class="oc-info">📅 ${o.date}${o.name?' • 👤 '+o.name:''}${o.track?' • 🚚 '+o.track:''}</div><div class="oc-items">${items}</div><div class="oc-total">${o.total.toFixed(0)}₽</div></div>`}).join('')}catch(e){el.innerHTML='<div class="empty"><div class="ei">😔</div><div class="et">Ошибка</div></div>'}}

async function loadFavorites(){if(!uid)return;const el=document.getElementById('favs-list');try{const r=await fetch(API+'/api/favorites?user_id='+uid);const d=await r.json();if(!d.ok||!d.favorites.length){el.innerHTML='<div class="empty"><div class="ei">⭐</div><div class="et">Избранное пусто<br><small>Добавляйте из каталога</small></div></div>';return}el.innerHTML=d.favorites.map(p=>{const pr=p.prices||{};const btns=Object.entries(pr).sort((a,b)=>a[1]-b[1]).map(([dos,v])=>`<div class="pbtn" onclick="addToCart(event,${p.id},'${dos.replace(/'/g,"\\'")}',${v})"><span class="d">${dos}</span><span class="p">${v}₽</span></div>`).join('');const rec=p.recipe_price>0?`<div class="rbtn" onclick="addToCart(event,${p.id},'Рецепт',${p.recipe_price})">📋 Рецепт — ${p.recipe_price}₽</div>`:'';return`<div class="card"><div class="top"><span class="em">${p.emoji}</span><div class="info"><div class="nm">${p.name}</div><div class="cat">${p.category}</div></div></div><div class="desc">${p.desc}</div><div class="prices">${btns}</div>${rec}</div>`}).join('')}catch(e){el.innerHTML='<div class="empty"><div class="ei">😔</div><div class="et">Ошибка</div></div>'}}

async function loadProfile(){if(!uid)return;const el=document.getElementById('profile-content');try{const r=await fetch(API+'/api/user?user_id='+uid);const d=await r.json();if(!d.ok){el.innerHTML='<div class="empty"><div class="ei">😔</div><div class="et">Ошибка</div></div>';return}const u=d.user;el.innerHTML=`<div class="profile-card"><div class="pc-title">👤 Основное</div><div class="pc-row"><span class="pc-label">ID</span><span class="pc-value">${u.id}</span></div><div class="pc-row"><span class="pc-label">Имя</span><span class="pc-value">${u.full_name||u.username||'-'}</span></div><div class="pc-row"><span class="pc-label">Статус</span><span class="pc-value">${u.is_vip?'⭐ VIP':'👤 Обычный'}</span></div>${u.discount>0?`<div class="pc-row"><span class="pc-label">Скидка</span><span class="pc-value" style="color:var(--green)">${u.discount}%</span></div>`:''}</div><div class="profile-card"><div class="pc-title">💰 Финансы</div><div class="pc-row"><span class="pc-label">Баланс</span><span class="pc-value" style="color:var(--cyan)">${u.balance.toFixed(0)}₽</span></div><div class="pc-row"><span class="pc-label">Потрачено</span><span class="pc-value">${u.total_spent.toFixed(0)}₽</span></div><div class="pc-row"><span class="pc-label">Заказов</span><span class="pc-value">${u.orders}</span></div></div><div class="profile-card"><div class="pc-title">👥 Рефералы</div><div class="ref-stat"><div><div class="rv">${u.ref_total}</div><div class="rl">Всего</div></div><div><div class="rv">${u.ref_confirmed}</div><div class="rl">Подтв.</div></div><div><div class="rv">${u.ref_pending}</div><div class="rl">Ожидают</div></div></div><div class="pc-row"><span class="pc-label">Заработано</span><span class="pc-value" style="color:var(--green)">${u.referral_earnings.toFixed(0)}₽</span></div></div>`}catch(e){el.innerHTML='<div class="empty"><div class="ei">😔</div><div class="et">Ошибка</div></div>'}}

async function loadReviews(){const el=document.getElementById('reviews-content');try{const r=await fetch(API+'/api/reviews');const d=await r.json();if(!d.ok){el.innerHTML='';return}let h='';if(d.count>0){h+=`<div class="rating-summary"><div class="rs-avg">${d.avg}</div><div class="rs-stars">${'⭐'.repeat(Math.round(d.avg))}</div><div class="rs-count">${d.count} отзывов</div></div>`}if(d.reviews.length){h+=d.reviews.map(r=>`<div class="review-card"><div class="rc-stars">${'⭐'.repeat(r.rating)}</div><div class="rc-user">${r.user}</div><div class="rc-text">${r.text}</div><div class="rc-date">${r.date}</div></div>`).join('')}else{h+='<div class="empty"><div class="et">Пока нет отзывов</div></div>'}el.innerHTML=h}catch(e){el.innerHTML=''}}

function goBot(){try{tg.close()}catch(e){toast('Откройте бот для оформления')}}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

init();
</script>
</body>
</html>
